<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MYHOME</title>
  <link rel="icon" type="image/png" href="ChatGPT Image May 31, 2026, 06_30_46 PM.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdfbf7;
      --surface: #ffffff;
      --surface2: #f4eee1;
      --ink: #1a1a1a;
      --muted: #736b5e;
      --subtle: #e6e1da;
      --accent: #b59469;
      --accent-dim: #9c7f56;
      --border: #e6e1da;
      --radius: 3px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 2rem 4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(253, 251, 247, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--ink);
    }

    .logo span { color: var(--accent); }

    nav {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    nav a { color: inherit; text-decoration: none; transition: color 0.2s; cursor: pointer; }
    nav a:hover { color: var(--ink); }

    /* ── Enter Product button ───────────────────────────────────── */
    .nav-enter-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bg) !important;
      background: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.45rem 1.1rem;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.22s, border-color 0.22s, color 0.22s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .nav-enter-btn::before {
      content: '+';
      font-size: 0.9rem;
      line-height: 1;
      color: inherit;
    }

    .nav-enter-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
      color: var(--bg) !important;
    }

    .hero {
      padding: 6rem 4rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .hero-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
      max-width: 600px;
    }

    .hero h1 em { font-style: italic; color: var(--accent); }

    .hero-sub {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .hero-bg-num {
      position: absolute;
      right: 3rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Playfair Display', serif;
      font-size: clamp(8rem, 18vw, 18rem);
      font-weight: 400;
      color: transparent;
      -webkit-text-stroke: 1px var(--subtle);
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    .rule { height: 1px; background: var(--border); margin: 0 4rem; }

    .filters {
      padding: 1.5rem 4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.4rem 0.9rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { color: var(--ink); border-color: var(--muted); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

    .grid-wrap { padding: 2rem 4rem 6rem; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.3s;
      animation: riseIn 0.6s ease both;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover { border-color: var(--accent-dim); transform: translateY(-3px); }

    .card-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/4.5;
      background: var(--surface2);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: brightness(1) saturate(1);
      transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s;
    }

    .card:hover .card-img-wrap img { transform: scale(1.06); filter: brightness(1.03) saturate(1); }

    .card-img-wrap::after {
      display: none;
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 2px;
    }

    .badge-new  { background: var(--accent); color: var(--bg); }
    .badge-sale { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

    .card-body {
      padding: 1rem 1.1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      border-top: 1px solid var(--border);
    }

    .card-category {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.3;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.65rem;
    }

    .card-price { font-size: 0.85rem; font-weight: 400; color: var(--ink); }
    .card-price .strike { text-decoration: line-through; color: var(--muted); font-size: 0.75rem; margin-right: 0.4rem; }
    .card-price .sale-price { color: var(--accent); }

    .add-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--subtle);
      border-radius: 50%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
      flex-shrink: 0;
    }

    .add-btn:hover { background: var(--accent); border-color: var(--accent); }
    .add-btn:hover svg path { stroke: var(--bg); }
    .add-btn svg { width: 12px; height: 12px; }
    .add-btn svg path { stroke: var(--muted); stroke-width: 1.6; fill: none; transition: stroke 0.25s; }

    /* Loading & error states */
    .state-msg {
      grid-column: 1 / -1;
      padding: 4rem 0;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .state-msg .dot {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .state-msg .dot:nth-child(2) { animation-delay: 0.2s; }
    .state-msg .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%            { opacity: 1; }
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      header, .hero, .grid-wrap, .filters, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      .rule { margin: 0 1.5rem; }
      nav { gap: 1.5rem; font-size: 0.65rem; }
      .hero-bg-num { display: none; }
      .nav-enter-btn { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">MYHOME<span>.</span></div>
    <nav>
      <a>Collections</a>
      <a>About us</a>
      <a>Contacts</a>
      <a>Cart (0)</a>
      <a href="add-product.html" class="nav-enter-btn">Enter Product</a>
    </nav>
  </header>

  <div class="hero">
    <div class="hero-eyebrow">Create your comfort</div>
    <h1>Welcome<br><em>Home</em></h1>
    <p class="hero-sub">A selection of considered things.</p>
    <div class="hero-bg-num">08</div>
  </div>

  <div class="rule"></div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
  </div>

  <div class="grid-wrap">
    <div class="product-grid" id="grid">
      <div class="state-msg">
        Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
      </div>
    </div>
  </div>

  <footer>
    <span>© 2026 Noire Studio</span>
    <span>All rights reserved</span>
  </footer>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWk8R61wDMAqoUkedYMeGpx6sjXPkubs_PVQtMUIPAoFNJI8eHe8tD7pXH-kYznMjHju7Tfh1VBA8B/pub?output=csv';

    const plus = `<svg viewBox="0 0 12 12"><path d="M6 1v10M1 6h10"/></svg>`;
    const grid = document.getElementById('grid');
    const filtersEl = document.getElementById('filters');

    let allProducts = [];
    let activeFilter = 'all';

    /* ── CSV parser ───────────────────────────────────────────────── */
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));

      return lines.slice(1).map(line => {
        // Handle quoted fields that may contain commas
        const cols = [];
        let inQuote = false, cur = '';
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuote = !inQuote;
          } else if (ch === ',' && !inQuote) {
            cols.push(cur.trim());
            cur = '';
          } else {
            cur += ch;
          }
        }
        cols.push(cur.trim());

        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = cols[i] !== undefined ? cols[i] : '';
        });

        // Normalise types
        return {
          id:       Number(obj.id)       || 0,
          name:     obj.name             || '',
          category: obj.category         || '',
          price:    Number(obj.price)    || 0,
          sale:     obj.sale && obj.sale !== '' && obj.sale !== 'null' ? Number(obj.sale) : null,
          badge:    obj.badge && obj.badge !== '' && obj.badge !== 'null' ? obj.badge.toLowerCase() : null,
          img:      obj.img              || '',
        };
      }).filter(p => p.name); // skip empty rows
    }

    /* ── Build filter buttons from unique categories ──────────────── */
    function buildFilters(products) {
      const categories = [...new Set(products.map(p => p.category).filter(Boolean))];
      // Remove any category buttons added previously (keep "All")
      filtersEl.querySelectorAll('[data-filter]:not([data-filter="all"])').forEach(b => b.remove());

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.filter = cat;
        btn.textContent = cat;
        filtersEl.appendChild(btn);
      });

      filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          buildCards(activeFilter);
        });
      });
    }

    /* ── Render product cards ─────────────────────────────────────── */
    function buildCards(filter) {
      grid.innerHTML = '';
      const list = filter === 'all'
        ? allProducts
        : allProducts.filter(p => p.category === filter);

      if (list.length === 0) {
        grid.innerHTML = '<div class="state-msg">No products found.</div>';
        return;
      }

      list.forEach((p, i) => {
        const badgeHTML = p.badge
          ? `<span class="badge badge-${p.badge}">${p.badge}</span>`
          : '';
        const priceHTML = p.sale
          ? `<span class="strike">$${p.price}</span><span class="sale-price">$${p.sale}</span>`
          : `$${p.price}`;

        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${i * 0.07 + 0.05}s`;
        card.innerHTML = `
          <div class="card-img-wrap">
            <img src="${p.img}" alt="${p.name}" loading="lazy" />
            ${badgeHTML}
          </div>
          <div class="card-body">
            <span class="card-category">${p.category}</span>
            <div class="card-name">${p.name}</div>
            <div class="card-footer">
              <span class="card-price">${priceHTML}</span>
              <button class="add-btn" title="Add to cart">${plus}</button>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    }

    /* ── Fetch & initialise ───────────────────────────────────────── */
    async function init() {
      try {
        const res = await fetch(SHEET_CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        allProducts = parseCSV(text);
        buildFilters(allProducts);
        buildCards('all');
      } catch (err) {
        console.error('Failed to load products:', err);
        grid.innerHTML = '<div class="state-msg">Could not load products. Please try again later.</div>';
      }
    }

    init();
  </script>
</body>
</html>
